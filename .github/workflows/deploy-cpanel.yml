name: deploy-cpanel

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install PHP Dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Package Release
        run: |
          mkdir -p release
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            --exclude='release' \
            ./ release/

      - name: Patch public/index.php for cPanel structure
        env:
          APP_BASE_RELATIVE: ${{ secrets.APP_BASE_RELATIVE }}
        run: |
          if [ -z "$APP_BASE_RELATIVE" ]; then
            echo "APP_BASE_RELATIVE secret is required"
            exit 1
          fi

          APP_BASE_RELATIVE="${APP_BASE_RELATIVE#/}"
          APP_BASE_RELATIVE="${APP_BASE_RELATIVE%/}"

          if [ -z "$APP_BASE_RELATIVE" ]; then
            echo "APP_BASE_RELATIVE must not be empty"
            exit 1
          fi

          INDEX_FILE="release/public/index.php"
          sed -i "s#__DIR__.'/../storage#__DIR__.'/${APP_BASE_RELATIVE}/storage#g" "$INDEX_FILE"
          sed -i "s#__DIR__.'/../vendor#__DIR__.'/${APP_BASE_RELATIVE}/vendor#g" "$INDEX_FILE"
          sed -i "s#__DIR__.'/../bootstrap#__DIR__.'/${APP_BASE_RELATIVE}/bootstrap#g" "$INDEX_FILE"

      - name: Create deployment ZIP files
        run: |
          mkdir -p deploy-zips
          cd release
          zip -rq ../deploy-zips/laravel.zip . -x "public/*" "public/**"
          cd public
          zip -rq ../../deploy-zips/public_html.zip .

      - name: Upload laravel.zip to app directory
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_APP_DIR: ${{ secrets.FTP_APP_DIR }}
        run: |
          PORT="${FTP_PORT:-21}"
          curl --ftp-create-dirs --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 1200 \
            -u "$FTP_USER:$FTP_PASS" \
            -T "deploy-zips/laravel.zip" \
            "ftp://$FTP_HOST:$PORT/$FTP_APP_DIR/laravel.zip"

      - name: Upload public_html.zip to public directory
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PUBLIC_DIR: ${{ secrets.FTP_PUBLIC_DIR }}
        run: |
          PORT="${FTP_PORT:-21}"
          curl --ftp-create-dirs --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 1200 \
            -u "$FTP_USER:$FTP_PASS" \
            -T "deploy-zips/public_html.zip" \
            "ftp://$FTP_HOST:$PORT/$FTP_PUBLIC_DIR/public_html.zip"
